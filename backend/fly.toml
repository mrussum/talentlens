# Fly.io configuration for the TalentLens FastAPI backend.
# Generated for app name "talentlens-api" — change `app` if that name is taken
# (run `fly launch` for an interactive setup, or just edit this line).

app = "talentlens-api"
primary_region = "lhr"

[build]

[env]
  CLAUDE_MODEL = "claude-sonnet-4-20250514"
  CLAUDE_MAX_TOKENS = "2400"
  CLAUDE_TEMPERATURE = "0.3"
  # CORS_ALLOWED_ORIGINS is set as a Fly secret after the Vercel URL is known.
  # ANTHROPIC_API_KEY is ALWAYS a secret — never put it here.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
